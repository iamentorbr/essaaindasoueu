<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Blog</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="logo">✍️ Meu Blog</a>
        <nav class="main-nav">
          <a href="index.html" class="active">Início</a>
          <a href="midia.html">Fotos &amp; Vídeos</a>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="container main-layout">
    <section class="posts-feed" id="posts-feed">
      <!-- Posts rendered by JS -->
    </section>

    <aside class="sidebar">
      <div class="sidebar-card">
        <h3>Sobre</h3>
        <p>Aqui compartilho minhas ideias, reflexões e descobertas. Fique à vontade para curtir, comentar e compartilhar.</p>
      </div>
      <div class="sidebar-card">
        <h3>Categorias</h3>
        <ul class="category-list" id="category-list"></ul>
      </div>
      <div class="sidebar-card">
        <h3>Mais curtidos</h3>
        <ul class="top-liked" id="top-liked"></ul>
      </div>
    </aside>
  </main>

  <!-- Post Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="post-modal">
      <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
      <div id="modal-content"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Meu Blog · Feito com ❤️</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
